<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sarker Design & Build - Investor Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <div class="login-box">
    <h2>Investor Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" style="display:none;">

  <!-- Header -->
  <div class="header">
    <div class="header-inner">

      <div class="logo-container">
        <img src="39.png" class="logo-image">
        <div>
          <h2>Sarker Design & Build</h2>
          <p>Building Trust Through Excellence</p>
        </div>
      </div>

      <div class="nav">
        <a href="#">Dashboard</a>
        <a href="#" onclick="logout()">Logout</a>
      </div>

    </div>
  </div>

  <div class="container">

    <!-- Cards -->
    <div class="dashboard">
      <div class="card">
        <h3>Total Portfolio</h3>
        <p id="totalPortfolio"></p>
      </div>
      <div class="card">
        <h3>Total Invested</h3>
        <p id="totalInvested"></p>
      </div>
      <div class="card">
        <h3>Total Projects</h3>
        <p id="totalProjects"></p>
      </div>
    </div>

    <!-- Projects -->
    <h2>My Projects</h2>
    <div class="projects" id="projectList"></div>

    <!-- History -->
    <div class="history">
      <h2>Investment History</h2>
      <table>
        <thead>
          <tr>
            <th>Project</th>
            <th>Amount</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>

  </div>

  <!-- Notices -->
  <div class="notice-card">
    <h3>Updates</h3>
    <div id="noticeList"></div>
  </div>

  <!-- Modal -->
  <div id="noticeModal" class="notice-modal">
    <div class="notice-box">
      <h2 id="noticeTitle"></h2>
      <p id="noticeMessage"></p>
      <button onclick="closeNotice()">Close</button>
    </div>
  </div>

</div>

</body>
</html>
