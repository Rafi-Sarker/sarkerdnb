<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sarker Design & Build - Investor Login</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body>

<div id="loginPage" class="login">
  <div class="login-box">
    <h2>Investor Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<div id="dashboardPage" style="display:none;">
  <!-- Header -->
  <div class="header">
    <div class="header-inner">
      
      <!-- Logo + Motto -->
      <div class="logo-container">
        <img src="39.png" alt="Sarker Logo" class="logo-image">
        <div class="logo-text">
          <h2 class="logo">Sarker Design & Build</h2>
          <p class="motto">Building Trust Through Excellence</p>
        </div>
      </div>
  
      <!-- Navigation -->
      <div class="nav">
        <a href="index.html">Dashboard</a>
        <a href="projects.html">Projects</a>
        <a href="profile.html">Profile</a>
        <a href="user.html">Login</a>
      </div>
  
    </div>
</div>

  <div class="container">
    <div class="dashboard">
      <div class="card"><h3>Total Value</h3><p id="investment"></p></div>
      <div class="card"><h3>Invested</h3><p id="roi"></p></div>
      <div class="card"><h3>Total Projects</h3><p id="totalProjects"></p></div>
    </div>

    <h2>My Projects</h2>
    <div class="projects" id="projectList"></div>

    <div class="history">
      <h2>Investment History</h2>
      <table>
        <thead><tr><th>Project</th><th>Amount</th><th>Date</th></tr></thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </div>
</div>

</body>
</html>
