<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <h1>SARKER Design & Build</h1>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="details.html">Projects</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <div class="container">

        <!-- Dashboard Cards -->
        <section class="dashboard">
            <div class="card">
                <h3>Total Projects</h3>
                <p>12</p>
            </div>
            <div class="card">
                <h3>Ongoing</h3>
                <p>5</p>
            </div>
            <div class="card">
                <h3>Completed</h3>
                <p>7</p>
            </div>
        </section>

        <!-- Projects Overview -->
        <section class="projects">
            <div class="project-card">
                <img src="https://via.placeholder.com/400x180" class="project-image" alt="Project 1">
                <div class="project-content">
                    <h3 class="project-title">5-Storey Building</h3>
                    <p class="project-description">Ongoing project in Dhaka, expected completion: Dec 2026.</p>
                    <div class="progress-bar">
                        <div class="progress" style="width: 40%;">40%</div>
                    </div>
                </div>
            </div>

            <div class="project-card">
                <img src="https://via.placeholder.com/400x180" class="project-image" alt="Project 2">
                <div class="project-content">
                    <h3 class="project-title">Residential Complex</h3>
                    <p class="project-description">Completed last year with client satisfaction.</p>
                    <div class="progress-bar">
                        <div class="progress" style="width: 100%;">100%</div>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <!-- Footer -->
    <footer class="footer">
        &copy; 2026 SARKER Design & Build
    </footer>

</body>
</html>
