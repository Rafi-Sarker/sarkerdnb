<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sarker Design & Build - Investor System</title>

<style>
body {margin:0;font-family:'Segoe UI';background:#f5f7fb;}
.header {position:sticky;top:0;z-index:1000;background:linear-gradient(135deg,#0a2e6f,#123a8c);color:gold;padding:20px;text-align:center;}
.nav {display:flex;justify-content:center;gap:20px;margin-top:10px;}
.nav a {color:gold;text-decoration:none;font-weight:bold;}
.container {padding:20px;max-width:1200px;margin:auto;}
.dashboard {display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:30px;}
.card {background:white;padding:20px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
.projects {display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}
.project-card {background:white;border-radius:12px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,0.1);}
.project-content {padding:15px;}
.progress-bar {background:#ddd;height:20px;border-radius:20px;overflow:hidden;}
.progress {height:100%;background:#0a2e6f;color:gold;text-align:center;font-size:12px;}
.login {display:flex;justify-content:center;align-items:center;height:100vh;}
.login-box {background:white;padding:30px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,0.2);}
input {width:100%;padding:10px;margin:10px 0;}
button {padding:10px;width:100%;cursor:pointer;}
.admin-panel {margin-top:30px;background:white;padding:20px;border-radius:10px;}
.admin-panel input {margin:5px 0;}
</style>
</head>

<body>

<div id="loginPage" class="login">
  <div class="login-box">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<div id="dashboardPage" style="display:none;">
<div class="header">
  <h2>Sarker Design & Build</h2>
  <div class="nav">
    <a href="#">Dashboard</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</div>

<div class="container">

<div id="userSection"></div>

<div id="adminSection" style="display:none;" class="admin-panel">
  <h3>Admin Panel</h3>
  <input type="text" id="newUser" placeholder="Username">
  <input type="password" id="newPass" placeholder="Password">
  <button onclick="addInvestor()">Add Investor</button>

  <h4>All Investors</h4>
  <ul id="investorList"></ul>
</div>

</div>
</div>

<script>
let investors = JSON.parse(localStorage.getItem('investors')) || [
  {username:"rafi",password:"1234",investments:[{project:"Alpha",amount:500000,roi:18,progress:35}]},
  {username:"karim",password:"1234",investments:[{project:"Beta",amount:300000,roi:15,progress:10}]}
];

let currentUser=null;

function login(){
  let u=document.getElementById('username').value;
  let p=document.getElementById('password').value;

  if(u==="admin" && p==="admin"){
    document.getElementById('loginPage').style.display='none';
    document.getElementById('dashboardPage').style.display='block';
    document.getElementById('adminSection').style.display='block';
    loadAdmin();
    return;
  }

  currentUser=investors.find(x=>x.username===u && x.password===p);

  if(currentUser){
    document.getElementById('loginPage').style.display='none';
    document.getElementById('dashboardPage').style.display='block';
    loadUser();
  } else alert('Wrong login');
}

function logout(){location.reload();}

function loadUser(){
  let total=0, roiSum=0;
  let html=`<div class="dashboard">`;

  currentUser.investments.forEach(i=>{
    total+=i.amount; roiSum+=i.roi;
  });

  html+=`<div class="card"><h3>Total</h3><p>৳${total}</p></div>`;
  html+=`<div class="card"><h3>ROI</h3><p>${(roiSum/currentUser.investments.length).toFixed(2)}%</p></div>`;
  html+=`</div><div class="projects">`;

  currentUser.investments.forEach(i=>{
    html+=`<div class="project-card"><div class="project-content">
    <h3>${i.project}</h3>
    <p>৳${i.amount}</p>
    <div class="progress-bar"><div class="progress" style="width:${i.progress}%">${i.progress}%</div></div>
    </div></div>`;
  });

  html+=`</div>`;
  document.getElementById('userSection').innerHTML=html;
}

function loadAdmin(){
  let list="";
  investors.forEach((inv,i)=>{
    list+=`<li>${inv.username} <button onclick="deleteInvestor(${i})">Delete</button></li>`;
  });
  document.getElementById('investorList').innerHTML=list;
}

function addInvestor(){
  let u=document.getElementById('newUser').value;
  let p=document.getElementById('newPass').value;
  if(!u||!p)return alert('Fill fields');

  investors.push({username:u,password:p,investments:[]});
  localStorage.setItem('investors',JSON.stringify(investors));
  loadAdmin();
}

function deleteInvestor(i){
  investors.splice(i,1);
  localStorage.setItem('investors',JSON.stringify(investors));
  loadAdmin();
}
</script>

</body>
</html>
