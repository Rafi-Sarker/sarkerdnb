<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sarker Design & Build</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">

    <div class="logo-container">
      <img src="39.png" class="logo-image">
      <div class="logo-text">
        <h2 class="logo">Sarker Design & Build</h2>
        <p class="motto">Building Trust Through Excellence</p>
      </div>
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="nav">
      <a href="#">Dashboard</a>
      <a href="#">Projects</a>
      <a href="#">Profile</a>
      <a href="#">Login</a>
    </div>

  </div>
</div>

<!-- CONTENT -->
<div class="container">

  <div class="projects">

    <div class="project-card">
      <img src="37.jpg" class="project-image">
      <div class="project-content">
        <h3 class="project-title">Prime Tower</h3>
        <p class="project-description">Luxury residential building</p>

        <div class="progress-bar">
          <div class="progress" style="width:35%">35%</div>
        </div>

        <a href="#" class="cta">Details</a>
      </div>
    </div>

  </div>

</div>

<!-- NOTICE -->
<div class="notice-card">
  <h3>Updates <span id="noticeCount">0</span></h3>
  <div id="noticeList"></div>
</div>

<!-- MODAL -->
<div id="noticeModal" class="notice-modal">
  <div class="notice-box">
    <h2 id="noticeTitle"></h2>
    <p id="noticeMessage"></p>
    <button onclick="closeNotice()">Close</button>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Sarker Design & Build
</div>

</body>
</html>
