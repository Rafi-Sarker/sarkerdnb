<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sarker Design & Build - Dashboard</title>
  <style>
    /* Base Styles */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f7;
      color: #1a1a1a;
    }

    /* Header */
    .header {
      background-color: #0a2e6f; /* Royal Blue */
      color: #ffd700; /* Golden */
      padding: 20px 30px;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    /* Container */
    .container {
      padding: 30px;
    }

    /* Cards Layout */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 25px 20px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    .card h3 {
      margin: 0;
      font-size: 18px;
      color: #0a2e6f; /* Royal Blue */
      font-weight: 600;
    }

    .card p {
      font-size: 28px;
      margin: 10px 0 0;
      font-weight: bold;
      color: #ffd700; /* Golden */
    }

    /* Progress Bar Section */
    .progress-container {
      margin-top: 40px;
      background: white;
      padding: 25px 20px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    .progress-container h3 {
      color: #0a2e6f;
      margin: 0;
      font-weight: 600;
    }

    .progress-bar {
      background-color: #e0e0e0;
      border-radius: 20px;
      overflow: hidden;
      height: 28px;
      margin-top: 15px;
    }

    .progress {
      height: 100%;
      width: 9.375%; /* 3/32 */
      background-color: #0a2e6f; /* Royal Blue */
      text-align: center;
      color: #ffd700; /* Golden */
      line-height: 28px;
      font-weight: bold;
      font-size: 14px;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #888;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    Sarker Design & Build - Dashboard
  </div>

  <!-- Main Container -->
  <div class="container">

    <!-- Cards Section -->
    <div class="cards">
      <div class="card">
        <h3>Ongoing Projects</h3>
        <p>1</p>
      </div>

      <div class="card">
        <h3>Total Shares</h3>
        <p>32</p>
      </div>

      <div class="card">
        <h3>Shares Sold</h3>
        <p>3</p>
      </div>

      <div class="card">
        <h3>Available Shares</h3>
        <p>29</p>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-container">
      <h3>Project Share Sales Progress</h3>
      <div class="progress-bar">
        <div class="progress">9.38%</div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    © 2026 Sarker Design & Build | Civil Construction & Consultancy
  </div>

</body>
</html>
